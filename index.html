<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>肉鸽幸存者</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      touch-action: none;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #install-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #e94560;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 1000;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
    }
    #install-prompt:hover {
      background: #d63850;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="install-prompt">添加到主屏幕</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
